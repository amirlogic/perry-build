name: Rust

on:
  push:
    branches: [main]
  workflow_dispatch:
  
env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: 'windows-latest'

    steps:
    - uses: actions/checkout@v4
     - name: Install Rust
       uses: dtolnay/rust-toolchain@stable

     - name: Cache cargo
       uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --release -p perry-jsruntime
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
              name: libperry_jsruntime
              path: target/release/libperry_jsruntime.a
